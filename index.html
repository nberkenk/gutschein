<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 Geschenk</title>

<style>
    body{
        margin:0;
        background:#0d0d0d;
        color:white;
        font-family:Arial, sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        text-align:center;
        overflow:hidden;
        transition: transform 1.2s ease-out;
    }

    #container{
        max-width:500px;
        width:90%;
        z-index:2;
    }

    button{
        padding:15px 25px;
        font-size:18px;
        border:none;
        border-radius:12px;
        cursor:pointer;
        background:#22c55e;
        color:white;
    }

    #gif{
        display:none;
        width:100%;
        margin-top:20px;
        border-radius:12px;
    }

    /* ⏱ TIMER STYLE (NEU) */
    #timer{
        font-size:48px;
        font-weight:bold;
        margin-top:15px;
        display:none;
        text-shadow:0 0 10px rgba(255,255,255,0.3);
        transition: transform 0.15s ease, color 0.2s ease;
    }

    /* 🎥 Zoom */
    .zoom-in {
        animation: zoomIn 1.2s ease-out forwards;
    }

    @keyframes zoomIn {
        0% { transform: scale(1); }
        100% { transform: scale(1.7); }
    }

    /* 📳 Shake */
    .shake {
        animation: shake 0.1s infinite;
    }

    @keyframes shake {
        0% { transform: translate(2px,2px); }
        25% { transform: translate(-2px,3px); }
        50% { transform: translate(3px,-2px); }
        75% { transform: translate(-3px,2px); }
        100% { transform: translate(2px,-2px); }
    }

    /* 🌧 Konfetti */
    .confetti{
        position:fixed;
        width:10px;
        height:10px;
        top:-10px;
        animation:fall linear forwards;
        z-index:1;
    }

    @keyframes fall{
        to{
            transform:translateY(110vh) rotate(720deg);
        }
    }

    /* 🎆 Canvas */
    #fireworks{
        position:fixed;
        top:0;
        left:0;
        width:100vw;
        height:100vh;
        pointer-events:none;
        z-index:999;
    }

    /* 🎧 Overlay */
    #audioOverlay{
        position:fixed;
        top:0;
        left:0;
        width:100vw;
        height:100vh;
        background:rgba(0,0,0,0.92);
        display:flex;
        justify-content:center;
        align-items:center;
        z-index:10000;
    }

    #overlayBox{
        padding:20px 30px;
        background:#1f2937;
        border-radius:16px;
        font-size:18px;
        cursor:pointer;
        text-align:center;
    }
</style>
</head>

<body>

<!-- 🎧 AUDIO OVERLAY -->
<div id="audioOverlay">
    <div id="overlayBox">🔊 Tippe für Sound & Erlebnis 🎁</div>
</div>

<canvas id="fireworks"></canvas>

<div id="container">

    <h1 id="title">🎁 Bereit für dein Geschenk?</h1>

    <button id="startBtn">Geschenk öffnen</button>

    <div id="timer">10</div>

    <img id="gif" src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExYjJoeTQ4cWE3c3h4ZWF1am4yNTNiY2d0ZmtkNG8zczh2NW8za2FzMSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/nDSlfqf0gn5g4/giphy.gif">

    <audio id="audio" src="aber_glei_ikea.mp3"></audio>

</div>

<script>

const redirectURL = "https://links.info.email.ikea.com/f/a/Eb4TX--kB0jvyqLYHhql_w~~/AAA2mBA~/_TnRThxSPJ8XCpcG_YrzjF9FrNjuC7Lu0l5XjMnm9jTNft99-LPaEOYL5N6AaHM_eHqFPpFR8S5unuTpKcUQ6svtqf7mq3SdgTSxQHkbXuZdNxKWjZ4fIpOhs7s3DKdG-SVnHKgXboreyvosh-BMH55BqaBKFXbkbJpz5Zm0WJqXNV20UIOW_2xEPCgHG6EKuerpFmGxMU-J8bmLiHUc2DPVsjDrq-COcLUsfWWd942KJVxFSdlRvw5RKC8LcO-G4SXvct5KrvU9ie3XKL2X672ebsRUKZYyHnTeUVe0YY2QjyJIltfnWw9sFHpFeXFsnLtva9gODvQRCbI6-FJPQOD7uz_80cgfQTbJpUGnYa4Sudf3TQ4nPVhhoDH7lAjIb7a7CsN0FjhrNTjxnkBPpg~~";

const btn = document.getElementById("startBtn");
const gif = document.getElementById("gif");
const audio = document.getElementById("audio");
const timerEl = document.getElementById("timer");
const title = document.getElementById("title");

const confettiColors = [
    "#ff4d4d",
    "#ffd93d",
    "#6a5cff",
    "#00ffcc",
    "#ff7ee2"
];

/* 🎧 Unlock */
const overlay = document.getElementById("audioOverlay");
const overlayBox = document.getElementById("overlayBox");
let audioUnlocked = false;

overlayBox.addEventListener("click", ()=>{
    audioUnlocked = true;
    overlay.style.display = "none";
});

/* 📳 Vibration */
function vibrateSoft(){
    if (navigator.vibrate) navigator.vibrate(80);
}

function vibrateStrong(){
    if (navigator.vibrate) navigator.vibrate([200,100,200,100,600]);
}

/* 🌧 Start-Konfetti */
function startRainConfetti(){
    setInterval(()=>{
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=`hsl(${Math.random()*360},100%,50%)`;
        c.style.animationDuration=(2+Math.random()*3)+"s";
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),6000);
    },120);
}

/* 🎆 Canvas */
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function createFirework(x,y,amount){
    const colors=confettiColors;

    for(let i=0;i<amount;i++){
        particles.push({
            x,y,
            angle:Math.random()*Math.PI*2,
            speed:Math.random()*7+2,
            radius:Math.random()*3+1,
            color:colors[Math.floor(Math.random()*colors.length)],
            alpha:1
        });
    }
}

function update(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{
        p.x+=Math.cos(p.angle)*p.speed;
        p.y+=Math.sin(p.angle)*p.speed;
        p.alpha-=0.02;

        ctx.globalAlpha=p.alpha;
        ctx.fillStyle=p.color;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
        ctx.fill();

        if(p.alpha<=0)particles.splice(i,1);
    });

    requestAnimationFrame(update);
}
update();

/* 💥 FINAL */
function finalExplosion(){

    document.body.classList.add("zoom-in","shake");

    vibrateStrong();

    const cx=window.innerWidth/2;
    const cy=window.innerHeight/2;

    for(let i=0;i<35;i++){
        setTimeout(()=>{
            createFirework(cx+(Math.random()*300-150),cy+(Math.random()*300-150),200);
        },i*50);
    }
}

/* 🚀 START */
btn.addEventListener("click",()=>{

    btn.style.display="none";

    title.innerText="🎁🤪🎉";

    startRainConfetti();
    vibrateSoft();

    if(audioUnlocked){
        audio.play().catch(()=>{});
    }

    gif.style.display="block";
    timerEl.style.display="block";

    let time=10;

    const interval=setInterval(()=>{

        time--;
        timerEl.innerText=time;

        // 🎨 Farbwechsel + Pop
        timerEl.style.color = confettiColors[Math.floor(Math.random()*confettiColors.length)];
        timerEl.style.transform="scale(1.4)";
        setTimeout(()=>timerEl.style.transform="scale(1)",120);

        if(time<=0){
            clearInterval(interval);

            finalExplosion();

            setTimeout(()=>{
                window.location.href=redirectURL;
            },2500);
        }

    },1000);

});

</script>

</body>
</html>
