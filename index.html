<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 Geschenk</title>

<style>
    body{
        margin:0;
        background:#0d0d0d;
        color:white;
        font-family:Arial, sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        text-align:center;
        overflow:hidden;
        transition: transform 1.2s ease-out;
    }

    /* 🎥 Zoom */
    .zoom-in {
        animation: zoomIn 1.2s ease-out forwards;
    }

    @keyframes zoomIn {
        0% { transform: scale(1); }
        100% { transform: scale(1.8); }
    }

    /* 🌈 Puls Background */
    .pulse-bg {
        animation: pulseBg 1.2s ease-in-out infinite;
    }

    @keyframes pulseBg {
        0% { background-color:#0d0d0d; }
        25% { background-color:#1a1033; }
        50% { background-color:#2a0f4a; }
        75% { background-color:#1a1033; }
        100% { background-color:#0d0d0d; }
    }

    #container{
        max-width:500px;
        width:90%;
        z-index:2;
    }

    button{
        padding:15px 25px;
        font-size:18px;
        border:none;
        border-radius:12px;
        cursor:pointer;
        background:#22c55e;
        color:white;
    }

    #gif{
        display:none;
        width:100%;
        margin-top:20px;
        border-radius:12px;
    }

    #timer{
        font-size:32px;
        margin-top:15px;
        display:none;
    }

    /* 🎆 Canvas */
    #fireworks{
        position:fixed;
        top:0;
        left:0;
        width:100vw;
        height:100vh;
        pointer-events:none;
        z-index:999;
    }
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div id="container">

    <h1>🎁 Bereit für dein Geschenk?</h1>

    <button id="startBtn">Geschenk öffnen</button>

    <div id="timer">10</div>

    <img id="gif" src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExYjJoeTQ4cWE3c3h4ZWF1am4yNTNiY2d0ZmtkNG8zczh2NW8za2FzMSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/nDSlfqf0gn5g4/giphy.gif">

    <audio id="audio" src="aber_glei_ikea.mp3"></audio>

</div>

<script>

const redirectURL = "https://links.info.email.ikea.com/f/a/Eb4TX--kB0jvyqLYHhql_w~~/AAA2mBA~/_TnRThxSPJ8XCpcG_YrzjF9FrNjuC7Lu0l5XjMnm9jTNft99-LPaEOYL5N6AaHM_eHqFPpFR8S5unuTpKcUQ6svtqf7mq3SdgTSxQHkbXuZdNxKWjZ4fIpOhs7s3DKdG-SVnHKgXboreyvosh-BMH55BqaBKFXbkbJpz5Zm0WJqXNV20UIOW_2xEPCgHG6EKuerpFmGxMU-J8bmLiHUc2DPVsjDrq-COcLUsfWWd942KJVxFSdlRvw5RKC8LcO-G4SXvct5KrvU9ie3XKL2X672ebsRUKZYyHnTeUVe0YY2QjyJIltfnWw9sFHpFeXFsnLtva9gODvQRCbI6-FJPQOD7uz_80cgfQTbJpUGnYa4Sudf3TQ4nPVhhoDH7lAjIb7a7CsN0FjhrNTjxnkBPpg~~";

const btn = document.getElementById("startBtn");
const gif = document.getElementById("gif");
const audio = document.getElementById("audio");
const timerEl = document.getElementById("timer");

/* 📳 Vibration */
function vibrateSoft(){
    if (navigator.vibrate) navigator.vibrate(80);
}

function vibrateStrong(){
    if (navigator.vibrate) navigator.vibrate([200,100,200,100,600]);
}

/* 🎆 Canvas Setup */
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework(x, y){
    const colors = ["#ff4d4d","#ffd93d","#6a5cff","#00ffcc","#ff7ee2"];

    for(let i=0;i<80;i++){
        particles.push({
            x: x,
            y: y,
            angle: Math.random() * Math.PI * 2,
            speed: Math.random() * 6 + 2,
            radius: Math.random()*3+1,
            color: colors[Math.floor(Math.random()*colors.length)],
            alpha: 1
        });
    }
}

function updateFireworks(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach((p, index) => {
        p.x += Math.cos(p.angle) * p.speed;
        p.y += Math.sin(p.angle) * p.speed;
        p.alpha -= 0.015;

        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
        ctx.fill();

        if(p.alpha <= 0){
            particles.splice(index,1);
        }
    });

    requestAnimationFrame(updateFireworks);
}

updateFireworks();

/* 🎯 Finale Explosion */
function finalFireworks(){

    document.body.classList.add("zoom-in");
    document.body.classList.add("pulse-bg");

    vibrateStrong();

    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;

    for(let i=0;i<8;i++){
        setTimeout(() => {
            createFirework(
                cx + (Math.random()*200-100),
                cy + (Math.random()*200-100)
            );
        }, i * 200);
    }
}

/* 🎬 Start */
btn.addEventListener("click", () => {

    btn.style.display = "none";

    // 🎊 Starteffekt
    createFirework(window.innerWidth/2, window.innerHeight/2);
    vibrateSoft();

    // 🎵 Sound
    audio.play().catch(()=>console.log("Audio blockiert"));

    // 🖼 GIF
    gif.style.display = "block";

    // ⏱ Timer
    timerEl.style.display = "block";

    let time = 10;

    const interval = setInterval(() => {

        time--;
        timerEl.innerText = time;

        if(time <= 0){
            clearInterval(interval);

            finalFireworks();

            setTimeout(() => {
                window.location.href = redirectURL;
            }, 2500);
        }

    }, 1000);

});

</script>

</body>
</html>
