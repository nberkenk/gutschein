<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 Geschenk</title>

<style>
    body{
        margin:0;
        background:#FBD914;
        color:white;
        font-family:Arial, sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        text-align:center;
        overflow:hidden;
    }

    #container{
        max-width:500px;
        width:90%;
        z-index:2;
    }

    #soundHint{
        margin-bottom:15px;
        font-size:16px;
        opacity:0.85;
        color:#0058AB;
    }

    button{
        padding:15px 25px;
        font-size:18px;
        border:none;
        border-radius:12px;
        cursor:pointer;
        background:#0058AB;
        color:#FBD914;
    }

    #gif{
        display:none;
        width:100%;
        margin-top:20px;
        border-radius:12px;
    }

    #timer{
        font-size:48px;
        font-weight:bold;
        margin-top:15px;
        display:none;
        text-shadow:0 0 10px rgba(255,255,255,0.3);
        transition:transform 0.15s ease, color 0.2s ease;
    }

    .zoom-in{
        animation:zoomIn 1.2s ease-out forwards;
    }

    @keyframes zoomIn{
        0%{transform:scale(1);}
        100%{transform:scale(1.7);}
    }

    .shake{
        animation:shake 0.1s infinite;
    }

    @keyframes shake{
        0%{transform:translate(2px,2px);}
        25%{transform:translate(-2px,3px);}
        50%{transform:translate(3px,-2px);}
        75%{transform:translate(-3px,2px);}
        100%{transform:translate(2px,-2px);}
    }

    .confetti{
        position:fixed;
        width:10px;
        height:10px;
        top:-10px;
        animation:fall linear forwards;
        z-index:1;
    }

    @keyframes fall{
        to{
            transform:translateY(110vh) rotate(720deg);
        }
    }

    #fireworks{
        position:fixed;
        top:0;
        left:0;
        width:100vw;
        height:100vh;
        pointer-events:none;
        z-index:999;
    }

    /* 🌑 FAST FADE OVERLAY */
    #fadeOverlay{
        position:fixed;
        top:0;
        left:0;
        width:100vw;
        height:100vh;
        background:black;
        opacity:0;
        pointer-events:none;
        transition: opacity 1.2s ease;
        z-index:10000;
    }
</style>
</head>

<body>

<canvas id="fireworks"></canvas>
<div id="fadeOverlay"></div>

<div id="container">

    <h1 id="title">🎁</h1>

    <div id="soundHint">🔉 Ton einschalten!</div>

    <button id="startBtn">Geschenk öffnen</button>

    <div id="timer">10</div>

    <img id="gif" src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExaTh0c2ppcXpjZ2x6aHo0YnBjYWg1aGU4b2I1aHFpcXNiNzBvdjlsZiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/Rfwlp9c5bA7R3s7Y5D/giphy.gif">

    <audio id="audio" src="aber_glei_ikea.mp3"></audio>

</div>

<script>

const redirectURL = "https://links.info.email.ikea.com/f/a/Eb4TX--kB0jvyqLYHhql_w~~/AAA2mBA~/_TnRThxSPJ8XCpcG_YrzjF9FrNjuC7Lu0l5XjMnm9jTNft99-LPaEOYL5N6AaHM_eHqFPpFR8S5unuTpKcUQ6svtqf7mq3SdgTSxQHkbXuZdNxKWjZ4fIpOhs7s3DKdG-SVnHKgXboreyvosh-BMH55BqaBKFXbkbJpz5Zm0WJqXNV20UIOW_2xEPCgHG6EKuerpFmGxMU-J8bmLiHUc2DPVsjDrq-COcLUsfWWd942KJVxFSdlRvw5RKC8LcO-G4SXvct5KrvU9ie3XKL2X672ebsRUKZYyHnTeUVe0YY2QjyJIltfnWw9sFHpFeXFsnLtva9gODvQRCbI6-FJPQOD7uz_80cgfQTbJpUGnYa4Sudf3TQ4nPVhhoDH7lAjIb7a7CsN0FjhrNTjxnkBPpg~~";

const btn = document.getElementById("startBtn");
const gif = document.getElementById("gif");
const audio = document.getElementById("audio");
const timerEl = document.getElementById("timer");
const title = document.getElementById("title");
const hint = document.getElementById("soundHint");
const fade = document.getElementById("fadeOverlay");

const colors = ["#ff4d4d","#ffd93d","#6a5cff","#00ffcc","#ff7ee2"];

let redirectTriggered = false;

/* 📳 Vibration */
function vibrateSoft(){
    if(navigator.vibrate) navigator.vibrate(80);
}
function vibrateStrong(){
    if(navigator.vibrate) navigator.vibrate([200,100,200,100,600]);
}

/* 🌧 Confetti */
function startRainConfetti(){
    setInterval(()=>{
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=`hsl(${Math.random()*360},100%,50%)`;
        c.style.animationDuration=(2+Math.random()*3)+"s";
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),6000);
    },120);
}

/* 🎆 Fireworks */
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function createFirework(x,y,amount){
    for(let i=0;i<amount;i++){
        particles.push({
            x,y,
            angle:Math.random()*Math.PI*2,
            speed:Math.random()*7+2,
            radius:Math.random()*3+1,
            color:colors[Math.floor(Math.random()*colors.length)],
            alpha:1
        });
    }
}

function update(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{
        p.x+=Math.cos(p.angle)*p.speed;
        p.y+=Math.sin(p.angle)*p.speed;
        p.alpha-=0.02;

        ctx.globalAlpha=p.alpha;
        ctx.fillStyle=p.color;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
        ctx.fill();

        if(p.alpha<=0)particles.splice(i,1);
    });

    requestAnimationFrame(update);
}
update();

/* 💥 FINAL */
function finalExplosion(){

    document.body.classList.add("zoom-in","shake");

    vibrateStrong();

    const cx=window.innerWidth/2;
    const cy=window.innerHeight/2;

    for(let i=0;i<35;i++){
        setTimeout(()=>{
            createFirework(cx+(Math.random()*300-150),cy+(Math.random()*300-150),180);
        },i*50);
    }

    /* 🌑 FAST FADE + REDIRECT (NO PAUSE) */
    fade.style.opacity = 1;

    audio.volume = 1;

    let vol = audio.volume;
    const fadeAudio = setInterval(()=>{
        vol -= 0.08;
        if(vol <= 0){
            audio.pause();
            clearInterval(fadeAudio);
        } else {
            audio.volume = vol;
        }
    },80);

    setTimeout(()=>{
        window.location.href = redirectURL;
    }, 1200);
}

/* 🚀 START */
btn.addEventListener("click",()=>{

    btn.style.display="none";
    title.innerText="🎁🤪🎉";

    hint.style.display="none";

    startRainConfetti();
    vibrateSoft();

    audio.play().catch(()=>{});

    gif.style.display="block";
    timerEl.style.display="block";

    let time=10;

    const interval=setInterval(()=>{

        time--;
        timerEl.innerText=time;

        timerEl.style.color = colors[Math.floor(Math.random()*colors.length)];
        timerEl.style.transform="scale(1.4)";
        setTimeout(()=>timerEl.style.transform="scale(1)",120);

        if(time<=0){
            clearInterval(interval);
            finalExplosion();
        }

        if(time === 1 && !redirectTriggered){
            redirectTriggered = true;
        }

    },1000);

});

</script>

</body>
</html>
