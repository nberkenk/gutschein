<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 Geschenk</title>

<style>
    body{
        margin:0;
        background:#0d0d0d;
        color:white;
        font-family:Arial, sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        text-align:center;
        overflow:hidden;
    }

    #container{
        max-width:500px;
        width:90%;
    }

    button{
        padding:15px 25px;
        font-size:18px;
        border:none;
        border-radius:12px;
        cursor:pointer;
        background:#22c55e;
        color:white;
    }

    #gif{
        display:none;
        width:100%;
        margin-top:20px;
        border-radius:12px;
    }

    #timer{
        font-size:32px;
        margin-top:15px;
        display:none;
    }

    .confetti{
        position:fixed;
        width:10px;
        height:10px;
        top:-10px;
        animation:fall linear forwards;
    }

    @keyframes fall{
        to{
            transform:translateY(110vh) rotate(720deg);
        }
    }
</style>
</head>

<body>

<div id="container">

    <h1>🎁 Bereit für dein Geschenk?</h1>

    <button id="startBtn">Geschenk öffnen</button>

    <div id="timer">10</div>

    <img id="gif" src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExYjJoeTQ4cWE3c3h4ZWF1am4yNTNiY2d0ZmtkNG8zczh2NW8za2FzMSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/nDSlfqf0gn5g4/giphy.gif">

    <audio id="audio" src="aber_glei_ikea.mp3"></audio>

</div>

<script>

const redirectURL = "https://links.info.email.ikea.com/f/a/Eb4TX--kB0jvyqLYHhql_w~~/AAA2mBA~/_TnRThxSPJ8XCpcG_YrzjF9FrNjuC7Lu0l5XjMnm9jTNft99-LPaEOYL5N6AaHM_eHqFPpFR8S5unuTpKcUQ6svtqf7mq3SdgTSxQHkbXuZdNxKWjZ4fIpOhs7s3DKdG-SVnHKgXboreyvosh-BMH55BqaBKFXbkbJpz5Zm0WJqXNV20UIOW_2xEPCgHG6EKuerpFmGxMU-J8bmLiHUc2DPVsjDrq-COcLUsfWWd942KJVxFSdlRvw5RKC8LcO-G4SXvct5KrvU9ie3XKL2X672ebsRUKZYyHnTeUVe0YY2QjyJIltfnWw9sFHpFeXFsnLtva9gODvQRCbI6-FJPQOD7uz_80cgfQTbJpUGnYa4Sudf3TQ4nPVhhoDH7lAjIb7a7CsN0FjhrNTjxnkBPpg~~";

const btn = document.getElementById("startBtn");
const gif = document.getElementById("gif");
const audio = document.getElementById("audio");
const timerEl = document.getElementById("timer");

let confettiLoop;

function startConfettiRain(){
    confettiLoop = setInterval(confetti, 250);
}

function stopConfettiRain(){
    clearInterval(confettiLoop);
}

btn.addEventListener("click", () => {

    btn.style.display = "none";

    // 🎊 Dauer-Konfetti starten
    startConfettiRain();

    // 🎵 Sound starten (nach Klick erlaubt)
    audio.play().catch(()=>console.log("Audio blockiert"));

    // 🖼️ GIF anzeigen
    gif.style.display = "block";

    // ⏱️ Timer anzeigen
    timerEl.style.display = "block";

    confetti();

    let time = 10;

    const interval = setInterval(() => {

        time--;
        timerEl.innerText = time;

        if(time <= 0){
            clearInterval(interval);

            // 🔥 Dauer-Konfetti stoppen + Finale Explosion
            stopConfettiRain();
            confetti();

            setTimeout(() => {
                window.location.href = redirectURL;
            }, 2000);
        }

    }, 1000);

});

// 🎊 Konfetti-Einzelpartikel
function confetti(){
    for(let i=0;i<120;i++){
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random()*100 + "vw";
        c.style.background = `hsl(${Math.random()*360},100%,50%)`;
        c.style.animationDuration = (2 + Math.random()*3) + "s";
        document.body.appendChild(c);

        // Cleanup (verhindert Lag)
        setTimeout(() => c.remove(), 6000);
    }
}

</script>

</body>
</html>
